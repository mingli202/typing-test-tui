name: PR Rust Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
    paths:
      - 'tui/**'
      - '.github/workflows/pr-check.yml'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-test:
    name: cargo build and cargo test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run cargo build
        id: build
        continue-on-error: true
        working-directory: tui
        run: cargo build --locked

      - name: Run cargo test
        id: test
        continue-on-error: true
        working-directory: tui
        run: cargo test --locked

      - name: Comment PR with results
        if: always()
        uses: actions/github-script@v7
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        with:
          script: |
            const marker = '<!-- pr-rust-checks -->';
            const buildOutcome = process.env.BUILD_OUTCOME;
            const testOutcome = process.env.TEST_OUTCOME;

            const formatStatus = (label, outcome) => {
              const icon = outcome === 'success' ? '✅' : '❌';
              return `- ${icon} ${label}: ${outcome}`;
            };

            const body = [
              marker,
              '## PR Rust checks',
              '',
              formatStatus('cargo build --locked', buildOutcome),
              formatStatus('cargo test --locked', testOutcome),
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user.type === 'Bot' && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail workflow if any check failed
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        run: |
          if [ "$BUILD_OUTCOME" != "success" ] || [ "$TEST_OUTCOME" != "success" ]; then
            exit 1
          fi
