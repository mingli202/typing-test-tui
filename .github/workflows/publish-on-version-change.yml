name: Publish on Version Change

on:
  push:
    branches:
      - main
    paths:
      - 'tui/**'
      - '.github/workflows/publish-on-version-change.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          before_sha="${{ github.event.before }}"

          if [[ "$before_sha" =~ ^0+$ ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No previous commit to compare against."
            exit 0
          fi

          current_version="$(sed -nE 's/^version = "(.*)"/\1/p' tui/Cargo.toml | head -n 1)"
          previous_toml="$(git show "${before_sha}:tui/Cargo.toml" 2>/dev/null || true)"

          if [ -z "$previous_toml" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Cargo.toml does not exist in the previous commit."
            exit 0
          fi

          previous_version="$(printf '%s\n' "$previous_toml" | sed -nE 's/^version = "(.*)"/\1/p' | head -n 1)"

          if [ -z "$current_version" ] || [ -z "$previous_version" ]; then
            echo "Failed to read crate versions from Cargo.toml." >&2
            exit 1
          fi

          tag="v${current_version}"

          echo "current_version=$current_version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if [ "$current_version" = "$previous_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $current_version"
            exit 0
          fi

          if git rev-parse "$tag" >/dev/null 2>&1 || git ls-remote --tags origin "refs/tags/${tag}" | grep -q .; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Tag $tag already exists; skipping publish."
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "Version changed from $previous_version to $current_version"

      - name: Install Rust toolchain
        if: steps.version.outputs.changed == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        if: steps.version.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Publish crate
        if: steps.version.outputs.changed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        working-directory: tui
        run: cargo publish --locked

      - name: Create git tag
        if: steps.version.outputs.changed == 'true'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "${{ github.sha }}" -m "Release $TAG"
          git push origin "$TAG"
